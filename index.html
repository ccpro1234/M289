<script>
// ===== LICENSE SYSTEM =====
const EXPIRE_DATE = new Date("2026-07-12T23:59:59");

function checkExpire() {
    const now = new Date();
    const expireBox = document.getElementById("expireBox");
    const app = document.getElementById("app");
    const login = document.getElementById("loginScreen");

    // ===== แสดงผลแบบคงที่ =====

        login.style.display = "flex";
        app.style.display = "none";
    }
}


    let results = [];
    let rank1Tracker = { win: 0, total: 0, history: [] };
    const strategies = [
        { id: 'A', name: "GOD A", acc: 0, win: 0, total: 0, history: [] },
        { id: 'B', name: "GOD B", acc: 0, win: 0, total: 0, history: [] },
        { id: 'C', name: "GOD C", acc: 0, win: 0, total: 0, history: [] },
        { id: 'D', name: "GOD D", acc: 0, win: 0, total: 0, history: [] },
        { id: 'E', name: "GOD E", acc: 0, win: 0, total: 0, history: [] },
        { id: 'F', name: "GOD F", acc: 0, win: 0, total: 0, history: [] },
        { id: 'G', name: "GOD G", acc: 0, win: 0, total: 0, history: [] },
        { id: 'H', name: "GOD H", acc: 0, win: 0, total: 0, history: [] },
        { id: 'I', name: "GOD I", acc: 0, win: 0, total: 0, history: [] },
        { id: 'J', name: "GOD J", acc: 0, win: 0, total: 0, history: [] },
        { id: 'K', name: "GOD K", acc: 0, win: 0, total: 0, history: [] }
    ];

/* ===== LOGIN (LICENSE API) ===== */

async function login(){

const userInput =
document.getElementById("user");

const passInput =
document.getElementById("pass");

const loginBoxEl =
document.getElementById("loginScreen");

const appEl =
document.getElementById("app");

const loginErrEl =
document.getElementById("loginErr");

loginErrEl.textContent =
"กำลังตรวจสอบ License...";

try{

const res = await fetch(

"https://morning-block-55bb.havanalanna.workers.dev/?user="

+ encodeURIComponent(userInput.value)

+ "&pass="

+ encodeURIComponent(passInput.value)

);

const data =
await res.json();

if(data.status==="ok"){

loginBoxEl.style.display =
"none";

appEl.style.display =
"block";

loginErrEl.textContent="";

render();


const user =
userInput.value;

const pass =
passInput.value;


/* บันทึก Session */

localStorage.setItem(

"licenseUser",

user

);

localStorage.setItem(

"licensePass",

pass

/* ตรวจ License ทุก 30 วิ */

setInterval(async()=>{

try{

const r = await fetch(

+ encodeURIComponent(user)

+ "&pass="

+ encodeURIComponent(pass)

const j =
await r.json();

if(j.status!=="ok"){

alert(

localStorage.clear();

}

catch(e){

console.log(

"License Check Error"

);

}

}

else{

loginErrEl.textContent =

}

catch(e){

}
function togglePass() {
    const pass = document.getElementById("pass");
    pass.type = pass.type === "password" ? "text" : "password";
}
function add(v) {
    if(v !== 'T' && results.length >= 3) {

        // 🔥 sort ครั้งเดียว (ใช้ร่วมกันทั้งระบบ)
        const sorted = [...strategies]
            .sort((a,b) => b.acc - a.acc)
            .slice(0, 6);

        const best = sorted[0];

        if(best) {
            const bestPred = getPred(best.id);

            if(bestPred) {
                const win = (bestPred === v);

                if(win) rank1Tracker.win++;
                rank1Tracker.total++;
                rank1Tracker.history.push(win);
            }

            strategies.forEach(s => {
                const p = getPred(s.id);
                if(p) {
                    const win = (p === v);
                    if(win) s.win++;
                    s.total++;
                    s.acc = Math.round((s.win / s.total) * 100);
                    s.history.push(win);
                }
            });
        }

    }

    results.push(v);
    render();
}


    function undo() {
        if(results.length === 0) return;
        const last = results.pop();
        if(last !== 'T' && results.length >= 3) {
            if(rank1Tracker.history.length > 0) {
                if(rank1Tracker.history.pop()) rank1Tracker.win--;
                rank1Tracker.total--;
            }
            strategies.forEach(s => {
                if(s.history.length > 0) {
                    if(s.history.pop()) s.win--;
                    s.total--;
                    s.acc = s.total > 0 ? Math.round((s.win/s.total)*100) : 0;
                }
            });
        }
        render();
    }

    function reset() {
        if(confirm('Clear All Data?')) {
            results = [];
            rank1Tracker = { win: 0, total: 0, history: [] };
            strategies.forEach(s => { s.win=0; s.total=0; s.acc=0; s.history=[]; });
            render();
        }
    }
function getPred(id) {

    const v = results.filter(
        x => x !== 'T'
    );

    if(v.length < 3)
        return null;

    const L =
        v[v.length-1];

    const P =
        v[v.length-2];

    const P2 =
        v[v.length-3];

    const map = {

        'A':L,

        'B':
        L==='P'
        ?
        'B'
        :
        'P',

        'C':

        L!==P

        ?

        L

        :

        (

        L==='P'

        ?

        'B'

        :

        'P'

        ),

        'D':P,

        'E':

        P===L

        ?

        (

        L==='P'

        ?

        'B'

        :

        'P'

        )

        :

        L,

        'F':P2,

        'G':

        [L,P,P2]

        .filter(

        x=>x==='P'

        )

        .length>=2

        ?

        'P'

        :

        'B',

        'H':

        L===P

        &&

        L===P2

        ?

        (

        L==='P'

        ?

        'B'

        :

        'P'

        )

        :

        L,


        // ===== GOD I =====

        'I':

        v.slice(-6)

        .filter(

        x=>x==='P'

        )

        .length

        >=3

        ?

        'P'

        :

        'B',


        'J':

        v.length%2===0

        ?

        'P'

        :

        'B',

        'K':L

    };

    return map[id];

}
